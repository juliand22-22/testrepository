<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sealand Royal Trivia</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    color: #000000;
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 18px;
    min-height: 100vh;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 18px 60px;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 32px 0 24px;
    border-bottom: 3px solid #000000;
    margin-bottom: 32px;
  }

  .crown {
    font-size: 48px;
    display: block;
    margin-bottom: 8px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(18px, 5vw, 26px);
    color: #000000;
    letter-spacing: 2px;
    line-height: 1.3;
  }

  header p {
    margin-top: 10px;
    color: #444444;
    font-style: italic;
    font-size: 16px;
  }

  .motto {
    display: inline-block;
    margin-top: 12px;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #000000;
  }

  /* SCORE BAR */
  #scorebar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f2f2f2;
    border: 2px solid #000000;
    border-radius: 8px;
    padding: 12px 20px;
    margin-bottom: 24px;
    font-size: 14px;
    letter-spacing: 1px;
  }

  #scorebar span { color: #444444; text-transform: uppercase; font-size: 12px; }
  #scorebar strong { color: #000000; font-size: 20px; font-family: 'Cinzel Decorative', serif; }

  /* PROGRESS */
  .progress-track {
    height: 6px;
    background: #dddddd;
    border-radius: 3px;
    margin-bottom: 24px;
    overflow: hidden;
    border: 1px solid #bbbbbb;
  }

  .progress-fill {
    height: 100%;
    background: #000000;
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  /* QUESTION CARD */
  .card {
    background: #f9f9f9;
    border: 2px solid #000000;
    border-radius: 10px;
    padding: 28px 24px 24px;
    animation: slidein 0.4s ease;
  }

  @keyframes slidein {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #555555;
    margin-bottom: 10px;
  }

  .q-type {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
    font-weight: 600;
  }

  .q-type.fact   { background: #000000; color: #ffffff; }
  .q-type.fun    { background: #555555; color: #ffffff; }
  .q-type.prince { background: #333333; color: #ffffff; }

  .q-text {
    font-size: clamp(17px, 3.5vw, 21px);
    line-height: 1.6;
    color: #000000;
    margin-bottom: 24px;
    font-weight: 600;
  }

  /* OPTIONS */
  .options { display: grid; gap: 10px; }

  .option {
    background: #ffffff;
    border: 2px solid #000000;
    border-radius: 8px;
    padding: 14px 18px;
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    font-size: 17px;
    color: #000000;
    text-align: left;
    transition: background 0.15s ease;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option:hover:not(:disabled) { background: #eeeeee; }

  .option .opt-letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid #000000;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: #000000;
    flex-shrink: 0;
    font-family: 'Cinzel Decorative', serif;
    font-weight: 700;
  }

  .option.correct {
    background: #006600;
    border-color: #006600;
    color: #ffffff;
  }
  .option.correct .opt-letter { background: #004400; border-color: #ffffff; color: #ffffff; }

  .option.wrong {
    background: #cc0000;
    border-color: #cc0000;
    color: #ffffff;
    opacity: 0.85;
  }
  .option.wrong .opt-letter { background: #990000; border-color: #ffffff; color: #ffffff; }

  .option:disabled { cursor: default; }

  /* FEEDBACK */
  .feedback {
    margin-top: 18px;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 16px;
    line-height: 1.55;
    display: none;
    animation: fadein 0.3s ease;
  }

  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

  .feedback.show { display: block; }
  .feedback.correct-fb { background: #e6f4e6; border: 2px solid #006600; color: #003300; }
  .feedback.wrong-fb   { background: #fce8e8; border: 2px solid #cc0000; color: #550000; }
  .feedback strong { color: inherit; font-weight: 700; }

  /* NEXT BUTTON */
  #next-btn {
    display: none;
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    background: #000000;
    border: 2px solid #000000;
    border-radius: 8px;
    color: #ffffff;
    font-family: 'Crimson Pro', serif;
    font-size: 18px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.2s;
  }

  #next-btn:hover { background: #333333; }

  /* RESULTS */
  #results {
    display: none;
    text-align: center;
    animation: slidein 0.5s ease;
  }

  .result-crest { font-size: 72px; margin-bottom: 16px; }

  #results h2 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(18px, 5vw, 26px);
    color: #000000;
    margin-bottom: 10px;
  }

  .final-score {
    font-size: 56px;
    font-family: 'Cinzel Decorative', serif;
    color: #000000;
    margin: 14px 0;
  }

  .rank {
    display: inline-block;
    padding: 6px 20px;
    border: 2px solid #000000;
    border-radius: 20px;
    color: #000000;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
    font-weight: 700;
  }

  .result-msg {
    color: #333333;
    font-style: italic;
    font-size: 18px;
    max-width: 500px;
    margin: 0 auto 28px;
    line-height: 1.6;
  }

  #restart-btn {
    padding: 14px 40px;
    background: #000000;
    border: 2px solid #000000;
    border-radius: 8px;
    color: #ffffff;
    font-family: 'Cinzel Decorative', serif;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
  }

  #restart-btn:hover { background: #333333; }

  /* FLAG STRIPE */
  .flag-stripe {
    height: 5px;
    background: linear-gradient(90deg, #000000 50%, #cc0000 50%);
    border-radius: 2px;
    margin-bottom: 28px;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <span class="crown">👑</span>
    <h1>SEALAND ROYAL TRIVIA</h1>
    <p>Ha, he — how well do you know the Bates princes of Sealand?</p>
    <span class="motto">E Mare Libertas</span>
  </header>

  <div class="flag-stripe"></div>

  <div id="quiz-section">
    <div id="scorebar">
      <div><span>Score</span><br><strong id="score-display">0</strong></div>
      <div style="text-align:center"><span>Question</span><br><strong id="q-counter">1 / 12</strong></div>
      <div style="text-align:right"><span>Correct</span><br><strong id="streak-display">0</strong></div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <div class="card" id="question-card">
      <div class="q-number" id="q-number">Question 1</div>
      <span class="q-type" id="q-type-badge"></span>
      <p class="q-text" id="q-text"></p>
      <div class="options" id="options-container"></div>
      <div class="feedback" id="feedback"></div>
      <button id="next-btn" onclick="nextQuestion()">Next Question →</button>
    </div>
  </div>

  <div id="results">
    <div class="result-crest">🏰</div>
    <h2>Royal Decree</h2>
    <div class="final-score" id="final-score"></div>
    <div class="rank" id="rank-title"></div>
    <p class="result-msg" id="result-msg"></p>
    <button id="restart-btn" onclick="restartQuiz()">Play Again</button>
  </div>

</div>

<script>
const questions = [
  {
    type: "fact",
    typeLabel: "Historical Fact",
    q: "On what date did Prince Roy declare Sealand's independence — and whose birthday was it?",
    options: ["1st January 1967 — his own birthday", "2nd September 1967 — Princess Joan's birthday", "14th August 1967 — Prince Michael's birthday", "4th July 1968 — chosen for American symbolism"],
    answer: 1,
    feedback: "Roy declared independence on <strong>2nd September 1967 — Princess Joan's birthday</strong>, which he described as a hugely romantic gesture in making her a princess."
  },
  {
    type: "fact",
    typeLabel: "Historical Fact",
    q: "What was Prince Roy's military rank before he became a pirate radio broadcaster?",
    options: ["Colonel", "Lieutenant", "Major", "Admiral"],
    answer: 2,
    feedback: "Roy Bates served in WWII and rose to the rank of <strong>Major</strong> in the First Battalion Royal Fusiliers. He saw action in Africa, Italy, Iraq, and Syria."
  },
  {
    type: "fact",
    typeLabel: "Historical Fact",
    q: "When young Michael first joined his father on Fort Roughs, how long did he think the adventure would last?",
    options: ["One weekend", "Six weeks", "Six months", "He planned to stay permanently"],
    answer: 1,
    feedback: "Michael thought it was a <strong>six-week adventure</strong> — he'd left his boarding school to visit the platform and ended up never going back, spending 34 years there."
  },

  {
    type: "fact",
    typeLabel: "Historical Fact",
    q: "In 1978, a coup attempt left Prince Michael in a very dangerous situation. What did his captor threaten?",
    options: ["To broadcast that Sealand was dissolved", "To throw him overboard", "To sell Sealand to Germany", "To hand him to the British Navy"],
    answer: 1,
    feedback: "Michael was tied up by the German-Dutch coup plotters, and one said to the other in German: <strong>'Let's chuck this bastard over the side. He's too much trouble.'</strong> He was released three days later before Roy recaptured Sealand."
  },
  {
    type: "fact",
    typeLabel: "Historical Fact",
    q: "What is Sealand's national motto?",
    options: ["Fortis et Liber", "E Mare Libertas", "Semper Fidelis", "In Undis Veritas"],
    answer: 1,
    feedback: "<strong>E Mare Libertas</strong> — 'From the Sea, Freedom.' The Bates family also created a flag, stamps, passports, currency, constitution, and national anthem."
  },
  {
    type: "fact",
    typeLabel: "Historical Fact",
    q: "What famous quote is most associated with Prince Roy about his attitude to life?",
    options: [
      "'A prince without a navy is just a man with a flag.'",
      "'I might die young or I might die old, but I will never die of boredom.'",
      "'The sea gives freedom to those brave enough to claim it.'",
      "'Britain can have the land — I prefer the sea.'"
    ],
    answer: 1,
    feedback: "Roy famously said: <strong>'I might die young or I might die old, but I will never die of boredom.'</strong> Given his life of pirate radio, coups, and North Sea sovereignty, he was very much a man of his word."
  },
  {
    type: "prince",
    typeLabel: "Roy vs. Michael",
    q: "Prince Roy was a WWII veteran, fisherman, butcher, and pirate radio pioneer. Prince Michael once said his father declared independence when he was supposed to do what?",
    options: ["Retire to the countryside", "Set up another radio station", "Start a fishing fleet", "Apply for a broadcasting licence"],
    answer: 1,
    feedback: "According to Michael, Roy originally went to Roughs Tower to <strong>set up another radio station</strong> — then had the bizarre idea of declaring independence instead. Very on-brand for Roy."
  },
  {
    type: "fact",
    typeLabel: "Sealand History",
    q: "In 1978, after Roy recaptured Sealand from the coup plotters, he held one prisoner longer than the rest. Why?",
    options: [
      "He was the ringleader of the coup",
      "He had accepted a Sealand passport, making him a citizen — and Roy charged him with treason",
      "He refused to leave voluntarily",
      "He was held as ransom until Germany paid compensation"
    ],
    answer: 1,
    feedback: "One of the German plotters had previously accepted a <strong>Sealand passport</strong>, making him a Sealand citizen in Roy's eyes. Roy charged him with treason — and West Germany had to send a diplomat directly to Sealand to negotiate his release."
  },

  {
    type: "fact",
    typeLabel: "Sealand History",
    q: "What was the original wartime purpose of the fortress that became Sealand?",
    options: [
      "A submarine refuelling depot",
      "A naval communications relay station",
      "An anti-aircraft artillery platform to shoot down German bombers",
      "A coastguard observation post"
    ],
    answer: 2,
    feedback: "HM Fort Roughs was built during <strong>World War II as an anti-aircraft platform</strong>, manned by marines to shoot down German warplanes flying bombing raids on London. It stood vacant from the 1950s until Roy Bates claimed it in the 1960s."
  },
  {
    type: "fun",
    typeLabel: "Fun / Personality",
    q: "If there were a diplomatic crisis, Prince Michael's stated plan for dealing with the British Navy rolling up to Sealand is...",
    options: [
      "Fire warning shots, just like his father taught him",
      "Bring out his best china and make them a nice cup of tea",
      "Raise the Sealand flag and read them the constitution",
      "Call an emergency session of Sealand's government"
    ],
    answer: 1,
    feedback: "In a CBS 60 Minutes interview, Prince Michael said his plan was to <strong>bring out his best china and make them a nice cup of tea</strong>. A very British solution from a very un-British prince."
  }
];

let current = 0;
let score = 0;
let correct = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Shuffle question order (keep questions array intact, work with indices)
let order = [];
function initOrder() {
  order = shuffle([...Array(questions.length).keys()]);
}

function loadQuestion() {
  const idx = order[current];
  const q = questions[idx];

  document.getElementById('q-number').textContent = `Question ${current + 1}`;
  document.getElementById('q-counter').textContent = `${current + 1} / ${questions.length}`;
  document.getElementById('progress-fill').style.width = `${(current / questions.length) * 100}%`;

  const badge = document.getElementById('q-type-badge');
  badge.textContent = q.typeLabel;
  badge.className = 'q-type ' + q.type;

  document.getElementById('q-text').textContent = q.q;

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i, idx);
    container.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';
  document.getElementById('next-btn').style.display = 'none';
  answered = false;
}

function selectAnswer(selected, qIdx) {
  if (answered) return;
  answered = true;
  const q = questions[qIdx];
  const btns = document.querySelectorAll('.option');

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === selected) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  if (selected === q.answer) {
    score += 10;
    correct++;
    fb.className = 'feedback show correct-fb';
    fb.innerHTML = `✅ Correct! ${q.feedback}`;
  } else {
    fb.className = 'feedback show wrong-fb';
    fb.innerHTML = `❌ Not quite. ${q.feedback}`;
  }

  document.getElementById('score-display').textContent = score;
  document.getElementById('streak-display').textContent = correct;
  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    loadQuestion();
    document.getElementById('question-card').style.animation = 'none';
    requestAnimationFrame(() => {
      document.getElementById('question-card').style.animation = 'slidein 0.4s ease';
    });
  }
}

function showResults() {
  document.getElementById('quiz-section').style.display = 'none';
  const results = document.getElementById('results');
  results.style.display = 'block';

  const pct = correct / questions.length;
  document.getElementById('final-score').textContent = `${score} pts`;

  let rank, msg;
  if (pct === 1)       { rank = '🏰 Prince/Princess of Sealand'; msg = 'Extraordinary! You know the Bates family as well as Prince Michael knows the North Sea. E Mare Libertas!'; }
  else if (pct >= 0.8) { rank = '⚓ Admiral of the Fleet'; msg = 'Impressive knowledge, worthy of a Sealand passport. Roy would be proud.'; }
  else if (pct >= 0.6) { rank = '🎖️ Sealand Citizen'; msg = 'A solid showing! You know your Bates princes. Study a bit more and you could earn a seat on the platform.'; }
  else if (pct >= 0.4) { rank = '📻 Pirate Radio Listener'; msg = 'You\'ve heard of Sealand, but the deeper lore awaits. Time for a reread of "Holding the Fort."'; }
  else                  { rank = '🌊 Lost at Sea'; msg = 'The North Sea has claimed your score — but don\'t despair! Even Roy failed a few times before establishing his kingdom.'; }

  document.getElementById('rank-title').textContent = rank;
  document.getElementById('result-msg').textContent = msg;
}

function restartQuiz() {
  current = 0; score = 0; correct = 0;
  document.getElementById('score-display').textContent = '0';
  document.getElementById('streak-display').textContent = '0';
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz-section').style.display = 'block';
  initOrder();
  loadQuestion();
}

// Start
initOrder();
loadQuestion();
</script>
</body>
</html>
